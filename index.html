<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Aroma Business Academy</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,300;0,400;0,500;0,600;1,300&display=swap" rel="stylesheet" />
  <style>
    :root {
      --coral:       #E8837A;
      --coral-dark:  #C85C52;
      --coral-light: #F2B5AD;
      --coral-pale:  #FDF1F0;
      --gold:        #C4A44A;
      --gold-light:  #F5EDD4;
      --sage:        #7A9E7E;
      --sage-light:  #EAF2EB;
      --cream:       #F8F3EE;
      --dark:        #2C1A17;
      --mid:         #6B4040;
      --muted:       #A07070;
      --white:       #FFFFFF;
      --ff:          'Poppins', sans-serif;
      --radius:      12px;
      --radius-lg:   20px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body { font-family: var(--ff); background: var(--cream); color: var(--dark); font-size: 16px; line-height: 1.7; }
    a { color: inherit; text-decoration: none; }

    nav {
      position: sticky; top: 0; z-index: 100;
      background: rgba(248,243,238,0.95);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid rgba(200,92,82,0.12);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 5vw; height: 68px;
    }
    .nav-logo img { height: 44px; width: auto; }
    .nav-links { display: flex; gap: 2rem; list-style: none; }
    .nav-links a { font-size: .82rem; font-weight: 400; color: var(--mid); letter-spacing: .02em; transition: color .2s; }
    .nav-links a:hover { color: var(--coral-dark); }
    .nav-cta {
      background: var(--coral-dark); color: var(--white) !important;
      padding: .4rem 1.2rem; border-radius: 99px; font-size: .8rem !important;
      font-weight: 500 !important; transition: background .2s !important;
    }
    .nav-cta:hover { background: var(--coral) !important; }

    .hero {
      min-height: 88vh; display: flex; align-items: center;
      padding: 4rem 5vw; position: relative; overflow: hidden;
    }
    .hero::before {
      content: ''; position: absolute; inset: 0;
      background: radial-gradient(ellipse 50% 70% at 0% 50%, rgba(232,131,122,.1) 0%, transparent 60%),
                  radial-gradient(ellipse 40% 40% at 100% 20%, rgba(196,164,74,.08) 0%, transparent 60%);
      pointer-events: none;
    }
    .hero-inner {
      max-width: 1100px; margin: 0 auto; width: 100%;
      display: grid; grid-template-columns: 1fr 1.2fr;
      gap: 4rem; align-items: center; position: relative; z-index: 1;
    }
    .hero-logo { display: flex; justify-content: center; }
